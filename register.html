<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MaidEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0062ff; --gold: #ffb400; }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            /* Yahan humne backup color aur high-quality image dono lagaye hain */
            background-color: #f4f8ff; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                              url('https://www.cleanipedia.com/images/v2/714b9c5f87b32816997a3c3b063d865c-1800w-1200h.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.98); 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #eee;
        }

        .logo-section {
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;
        }

        .logo-icon {
            width: 35px; height: 35px; background: var(--primary); border-radius: 8px;
            color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .logo-text { font-size: 22px; font-weight: 700; color: var(--primary); }
        .logo-text span { color: var(--gold); }

        .input-group { text-align: left; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #555; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; }

        .signup-btn {
            width: 100%; background: var(--primary); color: white; padding: 12px;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 5px;
        }

        .quote-box {
            margin-top: 15px; padding: 10px; background: #f9f9f9; border-left: 4px solid var(--gold);
            font-style: italic; color: #666; font-size: 11px; text-align: left;
        }

        .footer-links { margin-top: 15px; font-size: 13px; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="signup-card">
        <div class="logo-section">
            <div class="logo-icon">M</div>
            <div class="logo-text">Maid<span>Easy</span></div>
        </div>

        <h2 style="margin:0 0 10px 0; font-size: 18px; color: #333;">Create Account</h2>

        <form>
            <div class="input-group">
                <label>First Name</label>
                <input type="text" placeholder="" required>
            </div>
            <div class="input-group">
                <label>Last Name</label>
                <input type="text" placeholder="" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="" required>
            </div>
            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <div class="quote-box">
            "We provide trust and a helping hand to make your life simpler."
        </div>

        <div class="footer-links">
            Already have an account? <a href="login.html">Login Now</a>
        </div>
    </div>

</body>
</html>
