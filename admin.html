<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | MaidEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0062ff; --gold: #ffb400; --dark: #1a1a1a; --bg: #f4f8ff; --sidebar: #1e2a3a; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            min-height: 100vh;
            background: var(--bg);
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar);
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* FIXED: Maid = blue, Easy = gold */
        .sidebar-logo .maid-text { color: var(--primary); }
        .sidebar-logo .easy-text { color: var(--gold); }

        .sidebar-role {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 10px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .menu-item.active { color: white; }
        .menu-item i { width: 18px; font-size: 15px; }

        .menu-item.logout-item {
            color: #ff6b6b;
            margin-top: auto;
        }

        .menu-item.logout-item:hover { background: rgba(255,107,107,0.1); }

        .main {
            margin-left: 240px;
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .section { display: none; }
        .section.active { display: block; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 15px rgba(0,98,255,0.06);
        }

        .stat-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .stat-icon.blue { background: #e8f0ff; color: var(--primary); }
        .stat-icon.green { background: #e6f9f0; color: #27ae60; }
        .stat-icon.yellow { background: #fff8e6; color: #f39c12; }
        .stat-icon.red { background: #ffe8e8; color: #e74c3c; }

        .stat-info p { font-size: 12px; color: #888; }
        .stat-info h3 { font-size: 22px; font-weight: 700; color: var(--dark); }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,98,255,0.06);
            overflow: hidden;
            margin-bottom: 25px;
        }

        .card-header {
            padding: 16px 22px;
            border-bottom: 2px solid #f0f4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header i { color: var(--primary); }
        .card-header h3 { font-size: 15px; font-weight: 700; color: var(--dark); }

        table { width: 100%; border-collapse: collapse; }
        thead { background: #f8faff; }

        th {
            padding: 13px 18px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #f0f4ff;
        }

        td {
            padding: 14px 18px;
            font-size: 13px;
            color: var(--dark);
            border-bottom: 1px solid #f5f7ff;
        }

        tbody tr:hover { background: #f8faff; }
        tbody tr:last-child td { border-bottom: none; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-badge.approved { background: #e6f9f0; color: #27ae60; }
        .status-badge.pending { background: #fff8e6; color: #f39c12; }
        .status-badge.rejected { background: #ffe8e8; color: #e74c3c; }

        .approve-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 7px 14px;
            cursor: pointer;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            margin-right: 5px;
            transition: 0.2s;
        }

        .approve-btn:hover { background: #219a52; }

        .reject-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 7px 14px;
            cursor: pointer;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
        }

        .reject-btn:hover { background: #c0392b; }

        .maid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
            padding: 20px;
        }

        .maid-card {
            border: 1.5px solid #e8f0ff;
            border-radius: 14px;
            overflow: hidden;
            transition: 0.3s;
        }

        .maid-card:hover {
            box-shadow: 0 8px 24px rgba(0,98,255,0.1);
            transform: translateY(-3px);
        }

        .maid-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .maid-card-no-img {
            width: 100%;
            height: 160px;
            background: #e8f0ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #a0b4ff;
        }

        .maid-card-body { padding: 14px; }

        .maid-card-body h4 {
            font-size: 15px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .maid-card-body p {
            font-size: 12px;
            color: #888;
            margin-bottom: 2px;
        }

        .maid-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .edit-btn {
            flex: 1;
            background: #e8f0ff;
            color: var(--primary);
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
        }

        .edit-btn:hover { background: var(--primary); color: white; }

        .delete-btn {
            flex: 1;
            background: #ffe8e8;
            color: #e74c3c;
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
        }

        .delete-btn:hover { background: #e74c3c; color: white; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 22px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full { grid-column: 1 / -1; }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            padding: 11px 14px;
            border: 1.5px solid #e0e7ff;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: var(--dark);
            background: #f8faff;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,98,255,0.08);
        }

        .add-maid-btn {
            margin: 0 22px 22px 22px;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: calc(100% - 44px);
        }

        .add-maid-btn:hover { background: #004dc7; transform: translateY(-1px); }

        #editModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        #editModal.active { display: flex; }

        .modal-box {
            background: white;
            border-radius: 20px;
            width: 500px;
            max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 2px solid #f0f4ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--dark); }

        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #aaa;
            transition: 0.2s;
        }

        .modal-close:hover { color: #e74c3c; }

        .modal-body { padding: 22px; }
        .modal-body .form-group { margin-bottom: 14px; }

        .modal-save-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
            margin-top: 6px;
        }

        .modal-save-btn:hover { background: #004dc7; }

        .email-cell {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <!-- FIXED: Maid blue, Easy gold -->
        <div class="sidebar-logo">
            <span class="maid-text">Maid</span><span class="easy-text">Easy</span>
        </div>
        <div class="sidebar-role">Admin Panel</div>

        <div class="sidebar-menu">
            <button class="menu-item active" onclick="showSection('bookings', this)">
                <i class="fas fa-calendar-alt"></i> Bookings
            </button>
            <button class="menu-item" onclick="showSection('maids', this)">
                <i class="fas fa-users"></i> Manage Maids
            </button>
            <button class="menu-item" onclick="showSection('addmaid', this)">
                <i class="fas fa-user-plus"></i> Add Maid
            </button>
            <button class="menu-item logout-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <div class="main">

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-info"><p>Total Bookings</p><h3 id="statTotal">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info"><p>Approved</p><h3 id="statApproved">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
                <div class="stat-info"><p>Pending</p><h3 id="statPending">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
                <div class="stat-info"><p>Rejected</p><h3 id="statRejected">0</h3></div>
            </div>
        </div>

        <div class="section active" id="section-bookings">
            <div class="section-header">
                <h2>Booking Management</h2>
            </div>
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-calendar-alt"></i>
                    <h3>All Bookings</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>User Email</th>
                            <th>Maid Name</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Duration</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminBookingBody"></tbody>
                </table>
            </div>
        </div>

        <div class="section" id="section-maids">
            <div class="section-header">
                <h2>Manage Maids</h2>
            </div>
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-users"></i>
                    <h3>All Maids</h3>
                </div>
                <div class="maid-grid" id="maidGrid"></div>
            </div>
        </div>

        <div class="section" id="section-addmaid">
            <div class="section-header">
                <h2>Add New Maid</h2>
            </div>
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-user-plus"></i>
                    <h3>Add Maid After Verification</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Maid Name</label>
                        <input type="text" id="mName" placeholder="Enter maid name">
                    </div>
                    <div class="form-group">
                        <label>Service</label>
                        <input type="text" id="mService" placeholder="e.g. Cleaning">
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="text" id="mPrice" placeholder="e.g. 500 PKR/hr">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="mLocation" placeholder="e.g. Gulberg">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="mCategory" placeholder="e.g. Cook, Cleaner">
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="text" id="mImage" placeholder="Paste image URL">
                    </div>
                </div>
                <button class="add-maid-btn" onclick="addMaid()">
                    <i class="fas fa-plus"></i> Add Maid
                </button>
            </div>
        </div>

    </div>

    <div id="editModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Edit Maid</h3>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editMaidId">
                <div class="form-group">
                    <label>Maid Name</label>
                    <input type="text" id="editName" placeholder="Maid Name">
                </div>
                <div class="form-group">
                    <label>Service</label>
                    <input type="text" id="editService" placeholder="Service">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="editPrice" placeholder="Price">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="editLocation" placeholder="Location">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="editCategory" placeholder="Category">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="editImage" placeholder="Image URL">
                </div>
                <button class="modal-save-btn" onclick="saveMaidEdit()">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // FIXED: pass btn reference directly
        function showSection(name, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            if (btn) btn.classList.add('active');
            if (name === 'maids') fetchMaids();
        }

        async function fetchAllBookings() {
            try {
                const response = await fetch('http://localhost:5000/all-bookings');
                const bookings = await response.json();
                const tbody = document.getElementById('adminBookingBody');

                document.getElementById('statTotal').innerText = bookings.length;
                document.getElementById('statApproved').innerText = bookings.filter(b => b.status === 'Approved').length;
                document.getElementById('statPending').innerText = bookings.filter(b => b.status === 'Pending').length;
                document.getElementById('statRejected').innerText = bookings.filter(b => b.status === 'Rejected').length;

                tbody.innerHTML = bookings.map(b => `
                    <tr>
                        <td class="email-cell" title="${b.userEmail}">${b.userEmail}</td>
                        <td>${b.maidName}</td>
                        <td>${b.date}</td>
                        <td>${b.time || 'N/A'}</td>
                        <td>${b.duration || 'N/A'}</td>
                        <td>
                            <span class="status-badge ${(b.status||'').toLowerCase()}">
                                ${b.status === 'Approved' ? '<i class="fas fa-check"></i>' : b.status === 'Rejected' ? '<i class="fas fa-times"></i>' : '<i class="fas fa-clock"></i>'}
                                ${b.status}
                            </span>
                        </td>
                        <td>
                            ${b.status === 'Pending' ? `
                                <button onclick="updateStatus('${b._id}', 'Approved')" class="approve-btn"><i class="fas fa-check"></i> Approve</button>
                                <button onclick="updateStatus('${b._id}', 'Rejected')" class="reject-btn"><i class="fas fa-times"></i> Reject</button>
                            ` : '—'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Error:", err); }
        }

        async function updateStatus(id, newStatus) {
            await fetch('http://localhost:5000/update-booking', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status: newStatus })
            });
            fetchAllBookings();
        }

        // FIXED: store maids in array, use index for edit/delete
        let maidsData = [];

        async function fetchMaids() {
            const res = await fetch('http://localhost:5000/maids');
            maidsData = await res.json();
            const grid = document.getElementById('maidGrid');

            grid.innerHTML = maidsData.map((m, index) => `
                <div class="maid-card">
                    ${m.image
                        ? `<img src="${m.image}" alt="${m.name}" onerror="this.style.display='none'">`
                        : `<div class="maid-card-no-img"><i class="fas fa-user"></i></div>`}
                    <div class="maid-card-body">
                        <h4>${m.name}</h4>
                        <p><i class="fas fa-broom"></i> ${m.service || 'N/A'}</p>
                        <p><i class="fas fa-map-marker-alt"></i> ${m.location || 'N/A'}</p>
                        <p><i class="fas fa-tag"></i> ${m.price || 'N/A'}</p>
                        <div class="maid-card-actions">
                            <button class="edit-btn" onclick="openEditModal(${index})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="delete-btn" onclick="deleteMaid(${index})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function addMaid() {
            const maidData = {
                name: document.getElementById('mName').value,
                service: document.getElementById('mService').value,
                price: document.getElementById('mPrice').value,
                location: document.getElementById('mLocation').value,
                serviceCategory: document.getElementById('mCategory').value,
                image: document.getElementById('mImage').value
            };

            const res = await fetch('http://localhost:5000/admin/add-maid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(maidData)
            });

            if (res.ok) {
                alert("Maid added successfully!");
                document.getElementById('mName').value = '';
                document.getElementById('mService').value = '';
                document.getElementById('mPrice').value = '';
                document.getElementById('mLocation').value = '';
                document.getElementById('mCategory').value = '';
                document.getElementById('mImage').value = '';
            } else {
                alert("Error adding maid");
            }
        }

        // FIXED: use index to get maid from maidsData array
        function openEditModal(index) {
            const m = maidsData[index];
            document.getElementById('editMaidId').value = m._id;
            document.getElementById('editName').value = m.name || '';
            document.getElementById('editService').value = m.service || '';
            document.getElementById('editPrice').value = m.price || '';
            document.getElementById('editLocation').value = m.location || '';
            document.getElementById('editCategory').value = m.serviceCategory || '';
            document.getElementById('editImage').value = m.image || '';
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function saveMaidEdit() {
            const id = document.getElementById('editMaidId').value;
            const updatedData = {
                id,
                name: document.getElementById('editName').value,
                service: document.getElementById('editService').value,
                price: document.getElementById('editPrice').value,
                location: document.getElementById('editLocation').value,
                serviceCategory: document.getElementById('editCategory').value,
                image: document.getElementById('editImage').value
            };

            const res = await fetch('http://localhost:5000/admin/update-maid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedData)
            });

            if (res.ok) {
                alert("Maid updated successfully!");
                closeEditModal();
                fetchMaids();
            } else {
                alert("Error updating maid");
            }
        }

        // FIXED: use index to get maid ID from maidsData array
        async function deleteMaid(index) {
            const m = maidsData[index];
            if (!confirm(`Are you sure you want to delete ${m.name}?`)) return;

            const res = await fetch('http://localhost:5000/admin/delete-maid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: m._id })
            });

            if (res.ok) {
                alert("Maid deleted!");
                fetchMaids();
            } else {
                alert("Error deleting maid");
            }
        }

        fetchAllBookings();
    </script>
</body>
</html>
