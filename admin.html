<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel | MaidEasy</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background:#f4f4f4; }
        .sidebar { width: 200px; background: #2c3e50; color: white; padding: 20px; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        table { width: 100%; background: white; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #f8f8f8; }
        .approve-btn { background: #27ae60; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 5px; margin-right: 5px; }
        .reject-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 5px; }
        .sidebar a { display: block; color: white; text-decoration: none; margin-top: 20px; }
        /* Naya Form Style */
        .form-section { background: white; padding: 20px; border-radius: 10px; margin-top: 30px; }
        .form-section input { display: block; width: 95%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <p>Dashboard</p>
        <a href="#" onclick="logout()">Logout</a>
    </div>
    <div class="main">
        <h1>Booking Management</h1>
        <table>
            <thead>
                <tr>
                    <th>User Email</th><th>Maid Name</th><th>Date</th><th>Time</th><th>Duration</th><th>Status</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="adminBookingBody"></tbody>
        </table>

        <div class="form-section">
            <h3>Add New Maid (After  Verification)</h3>
            <form id="addMaidForm">
                <input type="text" id="mName" placeholder="Maid Name" required>
                <input type="text" id="mService" placeholder="Service (e.g. Cleaning)" required>
                <input type="text" id="mPrice" placeholder="Price" required>
                <input type="text" id="mLocation" placeholder="Location" required>
                <input type="text" id="mCategory" placeholder="Category" required>
                <input type="text" id="mImage" placeholder="Image URL" required>
                <button type="submit" class="approve-btn">Add Maid</button>
            </form>
        </div>
    </div>

    <script>
        if (localStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Maid Add karne ki logic
        document.getElementById('addMaidForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const maidData = {
                name: document.getElementById('mName').value,
                service: document.getElementById('mService').value,
                price: document.getElementById('mPrice').value,
                location: document.getElementById('mLocation').value,
                
                image: document.getElementById('mImage').value
            };

            const res = await fetch('http://localhost:5000/admin/add-maid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(maidData)
            });
            
            if(res.ok) {
                alert("Maid added successfully!");
                document.getElementById('addMaidForm').reset();
            } else {
                alert("Error adding maid");
            }
        });

        async function fetchAllBookings() {
            try {
                const response = await fetch('http://localhost:5000/all-bookings');
                const bookings = await response.json();
                const tbody = document.getElementById('adminBookingBody');
                
                tbody.innerHTML = bookings.map(b => `
                    <tr>
                        <td>${b.userEmail}</td>
                        <td>${b.maidName}</td>
                        <td>${b.date}</td>
                        <td>${b.time || 'N/A'}</td>
                        <td>${b.duration ? b.duration : 'N/A'}</td>
                        <td><strong>${b.status}</strong></td>
                        <td>
                            ${b.status === 'Pending' ? `
                                <button onclick="updateStatus('${b._id}', 'Approved')" class="approve-btn">Approve</button>
                                <button onclick="updateStatus('${b._id}', 'Rejected')" class="reject-btn">Reject</button>
                            ` : b.status}
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Error:", err); }
        }

        async function updateStatus(id, newStatus) {
            await fetch('http://localhost:5000/update-booking', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status: newStatus })
            });
            alert("Booking " + newStatus + "!");
            fetchAllBookings();
        }

        fetchAllBookings();
    </script>
</body>
</html>
