<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaidEasy | Premium Home Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0062ff; --gold: #ffb400; --dark: #1a1a1a; --light: #f4f8ff; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: white; color: var(--dark); overflow-x: hidden; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; gap: 12px; margin: 0 auto; transform: translateX(50px); }
        .logo-icon { width: 45px; height: 45px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 24px; box-shadow: 0 4px 12px rgba(0,98,255,0.3); }
        .logo-text { font-size: 28px; font-weight: 700; color: var(--primary); letter-spacing: -1px; }
        .logo-text span { color: var(--gold); }
        .login-btn { background: var(--primary); color: white; padding: 10px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s; }

        .hero { display: flex; flex-direction: column; align-items: center; padding: 40px 8%; background: var(--light); text-align: center; }
        .hero h1 { font-size: 40px; margin-bottom: 30px; }
        .hero span { color: var(--primary); }
        
        .working-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; }
        .working-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .working-card img { width: 100%; height: 220px; object-fit: cover; background: #ddd; }
        .working-card p { padding: 18px; font-weight: 600; color: var(--primary); margin: 0; font-size: 18px; }

        .footer { background: #f9f9f9; padding: 40px 8%; border-top: 1px solid #eee; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        .footer-box h4 { color: var(--primary); margin-bottom: 15px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .footer-box p { font-size: 14px; color: #555; line-height: 1.6; margin: 5px 0; }
        
        .social-box { display: flex; gap: 25px; align-items: center; margin-top: 15px; }
        .social-box a { font-size: 35px; transition: 0.3s; text-decoration: none; }
        .fa-facebook { color: #3b5998; }
        .fa-instagram { color: #e1306c; }
        .social-box a:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <div class="logo-icon">M</div>
            <div class="logo-text">Maid<span>Easy</span></div>
        </div>
        <a href="login.html" class="login-btn">Login</a>
    </header>

    <section class="hero">
        <h1>Trusted Hands for a <span>Lighter Home</span></h1>
        <div class="working-grid">
            <div class="working-card">
                <img src="https://images.pexels.com/photos/4099467/pexels-photo-4099467.jpeg?auto=compress&cs=tinysrgb&w=500" alt="House Cleaning">
                <p>House Cleaning</p>
            </div>
            <div class="working-card">
                <img src="https://images.pexels.com/photos/4253301/pexels-photo-4253301.jpeg?auto=compress&cs=tinysrgb&w=500" alt="Cooking">
                <p>Professional Cooking</p>
            </div>
            <div class="working-card">
                <img src="https://images.pexels.com/photos/5591581/pexels-photo-5591581.jpeg?auto=compress&cs=tinysrgb&w=500" alt="Laundry">
                <p>Laundry & Ironing</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-box">
                <h4><i class="fas fa-map-marker-alt"></i> Our Office</h4>
                <p>Office #4B, Arfa Software Technology Building, Lahore.</p>
            </div>
            <div class="footer-box">
                <h4><i class="fas fa-clock"></i> Office Timings</h4>
                <p>Monday - Friday: 09:00 AM - 06:00 PM</p>
            </div>
            <div class="footer-box">
                <h4><i class="fas fa-users"></i> Community</h4>
                <div class="social-box">
                    <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
                    <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
