<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | MaidEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0062ff; --gold: #ffb400; --dark: #1a1a1a; --bg: #f4f8ff; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 30px 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 30px auto;
            padding: 12px 24px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .logo-text { font-size: 22px; font-weight: 700; color: var(--primary); }
        .logo-text span { color: var(--gold); }

        .back-btn {
            background: var(--primary);
            color: white;
            padding: 9px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover { background: #004dc7; transform: translateY(-1px); }

        .page-header {
            max-width: 1000px;
            margin: 0 auto 25px auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-header h1 { font-size: 26px; font-weight: 700; color: var(--dark); }
        .page-header h1 span { color: var(--primary); }

        .booking-count {
            background: #e8f0ff;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .stats-row {
            max-width: 1000px;
            margin: 0 auto 25px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 15px rgba(0,98,255,0.06);
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .stat-icon.approved { background: #e6f9f0; color: #27ae60; }
        .stat-icon.pending  { background: #fff8e6; color: #f39c12; }
        .stat-icon.rejected { background: #ffe8e8; color: #e74c3c; }

        .stat-info p  { font-size: 12px; color: #888; font-weight: 500; }
        .stat-info h3 { font-size: 22px; font-weight: 700; color: var(--dark); }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,98,255,0.07);
            overflow: hidden;
        }

        .container-header {
            padding: 20px 28px;
            border-bottom: 2px solid #f0f4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container-header i  { color: var(--primary); font-size: 18px; }
        .container-header h2 { font-size: 16px; font-weight: 700; color: var(--dark); }

        table { width: 100%; border-collapse: collapse; }
        thead { background: #f8faff; }

        th {
            padding: 14px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #f0f4ff;
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            color: var(--dark);
            border-bottom: 1px solid #f5f7ff;
        }

        tbody tr { transition: background 0.2s; }
        tbody tr:hover { background: #f8faff; }
        tbody tr:last-child td { border-bottom: none; }

        .maid-cell { display: flex; align-items: center; gap: 10px; }

        .maid-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .maid-name { font-weight: 600; }

        .date-cell {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #555;
        }

        .date-cell i { color: var(--primary); font-size: 13px; }

        .date-range {
            font-size: 13px;
            color: #555;
            line-height: 1.8;
        }

        .date-range span {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            display: inline-block;
            margin-right: 4px;
        }

        .duration-badge {
            background: #f0f5ff;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        /* Full time duration badge */
        .duration-badge.fulltime {
            background: #1a1a1a;
            color: #ffb400;
        }

        .type-badge {
            background: #fff8e6;
            color: #f39c12;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            margin-top: 4px;
        }

        /* NEW: Maid type badge in table */
        .maid-type-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            margin-top: 3px;
        }

        .maid-type-tag.full-time { background: #1a1a1a; color: #ffb400; }
        .maid-type-tag.part-time { background: #e8f0ff; color: var(--primary); }

        .status-badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .status-badge.approved  { background: #e6f9f0; color: #27ae60; }
        .status-badge.pending   { background: #fff8e6; color: #f39c12; }
        .status-badge.rejected  { background: #ffe8e8; color: #e74c3c; }
        .status-badge.completed { background: #e8f0ff; color: var(--primary); }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state i { font-size: 50px; color: #c0d0ff; margin-bottom: 15px; display: block; }
        .empty-state h3 { font-size: 18px; color: #aaa; font-weight: 600; margin-bottom: 8px; }
        .empty-state p  { font-size: 14px; color: #bbb; }

        @media (max-width: 700px) {
            .stats-row { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; gap: 10px; align-items: flex-start; }
            td, th { padding: 12px 12px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">Maid<span>Easy</span></div>
        <a href="dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </nav>

    <div class="page-header">
        <h1>My <span>Bookings</span></h1>
        <div class="booking-count" id="totalCount">0 Bookings</div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon approved"><i class="fas fa-check-circle"></i></div>
            <div class="stat-info"><p>Approved</p><h3 id="approvedCount">0</h3></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon pending"><i class="fas fa-clock"></i></div>
            <div class="stat-info"><p>Pending</p><h3 id="pendingCount">0</h3></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon rejected"><i class="fas fa-times-circle"></i></div>
            <div class="stat-info"><p>Rejected</p><h3 id="rejectedCount">0</h3></div>
        </div>
    </div>

    <div class="container">
        <div class="container-header">
            <i class="fas fa-calendar-alt"></i>
            <h2>Booking History</h2>
        </div>

        <table id="bookingTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Maid Name</th>
                    <th>Date Range</th>
                    <th>Time</th>
                    <th>Daily Hours</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="bookingBody"></tbody>
        </table>
    </div>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = "login.html";
        }

        async function fetchBookings() {
            const userEmail = localStorage.getItem('userEmail');

            try {
                const response = await fetch(`http://localhost:5000/bookings?email=${userEmail}`);
                const bookings = await response.json();
                const tbody = document.getElementById('bookingBody');

                document.getElementById('totalCount').innerText = bookings.length + ' Bookings';
                document.getElementById('approvedCount').innerText = bookings.filter(b => b.status === 'Approved').length;
                document.getElementById('pendingCount').innerText  = bookings.filter(b => b.status === 'Pending').length;
                document.getElementById('rejectedCount').innerText = bookings.filter(b => b.status === 'Rejected').length;

                if (bookings.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="fas fa-calendar-times"></i>
                                    <h3>No Bookings Yet</h3>
                                    <p>You haven't made any bookings yet. Go ahead and book a maid!</p>
                                </div>
                            </td>
                        </tr>`;
                    return;
                }

                // Duration format — singular/plural + full-time handle
                function formatDuration(duration, maidType) {
                    if (!duration) return 'N/A';
                    if (maidType === 'full-time' || duration === 'Full Time') {
                        return `<span class="duration-badge fulltime">🏠 Full Time</span>`;
                    }
                    const num = parseInt(duration);
                    if (isNaN(num)) return `<span class="duration-badge">${duration}</span>`;
                    const label = num === 1 ? '1 Hour' : `${num} Hours`;
                    return `<span class="duration-badge">${label}</span>`;
                }

                // Time format — full-time handle
                function formatTime(time, maidType) {
                    if (maidType === 'full-time' || time === 'Full Time') {
                        return `<span style="color:#f39c12; font-weight:600;">🏠 Full Time</span>`;
                    }
                    return `<div class="date-cell"><i class="fas fa-clock"></i> ${time || 'N/A'}</div>`;
                }

                function formatDurationType(type) {
                    if (!type) return '';
                    const map = {
                        '15days'  : '15 Days',
                        '1month'  : '1 Month',
                        '2months' : '2 Months',
                        'custom'  : 'Custom'
                    };
                    return map[type] || type;
                }

                function statusBadge(status) {
                    const s = (status || 'Pending').toLowerCase();
                    const icons = {
                        approved  : 'fa-check-circle',
                        pending   : 'fa-clock',
                        rejected  : 'fa-times-circle',
                        completed : 'fa-check-double'
                    };
                    const icon = icons[s] || 'fa-clock';
                    return `<span class="status-badge ${s}"><i class="fas ${icon}"></i> ${status}</span>`;
                }

                tbody.innerHTML = bookings.map((b, index) => {

                    const startD     = b.startDate ? new Date(b.startDate).toLocaleDateString() : b.date;
                    const endD       = b.endDate   ? new Date(b.endDate).toLocaleDateString()   : 'N/A';
                    const isFullTime = b.maidType  === 'full-time';

                    return `
                        <tr>
                            <td style="color:#aaa; font-size:13px;">${index + 1}</td>
                            <td>
                                <div class="maid-cell">
                                    <div class="maid-avatar">${b.maidName ? b.maidName.charAt(0).toUpperCase() : 'M'}</div>
                                    <div>
                                        <span class="maid-name">${b.maidName || 'N/A'}</span><br>
                                        <span class="maid-type-tag ${isFullTime ? 'full-time' : 'part-time'}">
                                            ${isFullTime ? '🏠 Full Time' : '⏰ Part Time'}
                                        </span>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div class="date-range">
                                    <span>From</span>${startD}<br>
                                    <span>To</span>${endD}
                                </div>
                                ${b.durationType ? `<div class="type-badge">${formatDurationType(b.durationType)}</div>` : ''}
                            </td>
                            <td>${formatTime(b.time, b.maidType)}</td>
                            <td>${formatDuration(b.duration, b.maidType)}</td>
                            <td>${statusBadge(b.status)}</td>
                        </tr>`;
                }).join('');

            } catch (err) {
                console.error("Error fetching bookings:", err);
            }
        }

        fetchBookings();
    </script>
</body>
</html>
