<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MaidEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0062ff; --gold: #ffb400; --dark: #1a1a1a; --bg: #f4f8ff; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 960px;
            min-height: 560px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .left-panel {
            flex: 1;
            position: relative;
            background: url('frontend/maid-bg.png') center center / cover no-repeat;
            min-height: 400px;
        }

        .login-card {
            background: white;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .logo-text span { color: var(--gold); }

        .login-card h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .login-card > p {
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: border 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .login-btn:hover { background: #004dc7; transform: translateY(-2px); }

        .footer-links {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .back-home {
            display: inline-block;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
            text-decoration: none;
        }

        @media (max-width: 700px) {
            .login-wrapper { flex-direction: column; border-radius: 0; }
            .left-panel { min-height: 220px; }
            .login-card { padding: 36px 24px; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">

        <!-- LEFT: Image only, no tagline box -->
        <div class="left-panel"></div>

        <!-- RIGHT: Login Form -->
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">M</div>
                <div class="logo-text">Maid<span>Easy</span></div>
            </div>

            <h2>Welcome Back</h2>
            <p>Please enter your details to login</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Gmail Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="footer-links">
                Don't have an account? <a href="register.html">Create Account</a>
            </div>

            <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>

    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert("Login Successful!");
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email); 
                    
                    if (data.role && data.role.toLowerCase() === 'admin') {
                        localStorage.setItem('userRole', 'admin');
                        window.location.href = "admin.html";
                    } else {
                        localStorage.setItem('userRole', 'user');
                        window.location.href = "dashboard.html";
                    }
                } else {
                    alert(data.message || "Login Failed");
                }
            } catch (err) {
                alert("Server error, check if node server is running!");
            }
        });
    </script>
</body>
</html>
