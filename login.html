<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MaidEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0062ff; --gold: #ffb400; --dark: #1a1a1a; --bg: #f4f8ff; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo-section { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .logo-icon { width: 40px; height: 40px; background: var(--primary); border-radius: 10px; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .logo-text { font-size: 24px; font-weight: 700; color: var(--primary); }
        .logo-text span { color: var(--gold); }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #555; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #004dc7; transform: translateY(-2px); }
        .footer-links { margin-top: 25px; font-size: 14px; color: #666; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-home { display: inline-block; margin-top: 20px; font-size: 13px; color: #999; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon">M</div>
            <div class="logo-text">Maid<span>Easy</span></div>
        </div>

        <h2>Welcome Back</h2>
        <p>Please enter your details to login</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Gmail Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="register.html">Create Account</a>
        </div>

        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert("Login Successful!");
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email); 
                    
                    // Yahan role set karna zaroori hai taake admin.html ise read kar sake
                    if (data.role && data.role.toLowerCase() === 'admin') {
                        localStorage.setItem('userRole', 'admin');
                        window.location.href = "admin.html";
                    } else {
                        localStorage.setItem('userRole', 'user');
                        window.location.href = "dashboard.html";
                    }
                } else {
                    alert(data.message || "Login Failed");
                }
            } catch (err) {
                alert("Server error, check if node server is running!");
            }
        });
    </script>
</body>
</html>
