<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MaidEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0062ff; --gold: #ffb400; --dark: #1a1a1a; --bg: #f4f8ff; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 960px;
            min-height: 560px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .left-panel {
            flex: 1;
            position: relative;
            background: url('frontend/maid-bg.png') center center / cover no-repeat;
            min-height: 400px;
        }

        .login-card {
            background: white;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .logo-text span { color: var(--gold); }

        .login-card h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .login-card > p {
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: border 0.2s;
        }

        .input-group input:focus { border-color: var(--primary); }
        .input-group input.error { border-color: #e53935; background: #fff5f5; }
        .error-msg { display: none; color: #e53935; font-size: 11px; margin-top: 4px; }
        .error-msg.show { display: block; }

        .login-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .login-btn:hover { background: #004dc7; transform: translateY(-2px); }

        .footer-links {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-link {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
            transition: 0.2s;
        }
        .forgot-link:hover { color: var(--primary); }

        .back-home {
            display: inline-block;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
            text-decoration: none;
        }

        .loading-msg {
            display: none;
            margin-top: 10px;
            font-size: 13px;
            color: var(--primary);
        }

        @media (max-width: 700px) {
            .login-wrapper { flex-direction: column; border-radius: 0; }
            .left-panel { min-height: 220px; }
            .login-card { padding: 36px 24px; }
        }

        @media (max-width: 480px) {
            .login-wrapper { min-height: 100vh; }
            .left-panel { min-height: 160px; }
            .login-card { padding: 28px 18px; max-width: 100%; }
            .logo-text { font-size: 20px; }
            .logo-icon { width: 34px; height: 34px; font-size: 17px; }
            .login-card h2 { font-size: 18px; }
            .login-btn { font-size: 14px; padding: 11px; }
            .footer-links { font-size: 13px; }
            .input-group input { font-size: 13px; padding: 11px 13px; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">

        <div class="left-panel"></div>

        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">M</div>
                <div class="logo-text">Maid<span>Easy</span></div>
            </div>

            <h2>Welcome Back</h2>
            <p>Please enter your details to login</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Gmail Address</label>
                    <input type="email" id="email" required>
                    <span class="error-msg" id="err-email">⚠️ Please enter your email address.</span>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                    <span class="error-msg" id="err-password">⚠️ Please enter your password.</span>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Login</button>
                <p class="loading-msg" id="loadingMsg">⏳ Server starting up, please wait...</p>
            </form>

            <div class="footer-links">
                Don't have an account? <a href="register.html">Create Account</a>
            </div>

            <a href="forgot-password.html" class="forgot-link">
                🔑 Forgot Password?
            </a>

            <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>

    </div>

    <script>
        function showError(fieldId, show) {
            const input = document.getElementById(fieldId);
            const err = document.getElementById('err-' + fieldId);
            if (!input || !err) return;
            if (show) {
                input.classList.add('error');
                err.classList.add('show');
            } else {
                input.classList.remove('error');
                err.classList.remove('show');
            }
        }

        function clearAllErrors() {
            document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
            document.querySelectorAll('.error').forEach(e => e.classList.remove('error'));
        }

        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAllErrors();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loadingMsg = document.getElementById('loadingMsg');

            let hasError = false;

            // Email empty check
            if (!email) { showError('email', true); hasError = true; }

            // Password empty check
            if (!password) { showError('password', true); hasError = true; }

            if (hasError) return;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            loadingMsg.style.display = 'block';

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 60000);

                const response = await fetch('https://maid-easy-project.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    signal: controller.signal
                });

                clearTimeout(timeout);
                const data = await response.json();

                if (response.ok) {
                    alert("Login Successful!");
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);

                    if (data.role && data.role.toLowerCase() === 'admin') {
                        localStorage.setItem('userRole', 'admin');
                        window.location.href = "admin.html";
                    } else if (data.role && data.role.toLowerCase() === 'agent') {
                        localStorage.setItem('userRole', 'agent');
                        window.location.href = "agent.html";
                    } else {
                        localStorage.setItem('userRole', 'user');
                        window.location.href = "dashboard.html";
                    }
                } else {
                    alert("⚠️ Incorrect email or password. Please try again.");
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                    loadingMsg.style.display = 'none';
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    alert("Server is starting up, please wait 30 seconds and try again!");
                } else {
                    alert("Connection failed, please try again!");
                }
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
                loadingMsg.style.display = 'none';
            }
        });
    </script>
</body>
</html>
